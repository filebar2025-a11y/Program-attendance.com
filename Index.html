<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programatt - Login & Attendance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Login Section -->
  <div id="loginSection" class="bg-white p-8 rounded-2xl shadow-xl w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Programatt Login</h2>
    <input id="username" type="text" placeholder="Username" class="w-full p-2 border rounded mb-4">
    <input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-4">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
    <p id="error" class="text-red-500 mt-3 text-center"></p>
  </div>

  <!-- Attendance Section -->
  <div id="attendanceSection" class="hidden bg-white p-8 rounded-2xl shadow-xl w-[500px]">
    <h2 class="text-2xl font-bold mb-4 text-center">Online Attendance</h2>

    <div class="flex gap-2 mb-4">
      <input id="name" type="text" placeholder="Full Name" class="flex-1 p-2 border rounded">
      <select id="gender" class="p-2 border rounded">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <button onclick="addAttendance()" class="bg-green-600 text-white px-4 rounded hover:bg-green-700">Submit</button>
    </div>

    <table class="w-full border-collapse">
      <thead>
        <tr class="bg-gray-200">
          <th class="border p-2">Name</th>
          <th class="border p-2">Gender</th>
          <th class="border p-2">Status</th>
        </tr>
      </thead>
      <tbody id="attendanceTable"></tbody>
    </table>
  </div>

<script>
  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const error = document.getElementById('error');

    if (user === 'imranfile' && pass === '12345') {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('attendanceSection').classList.remove('hidden');
    } else {
      error.textContent = 'Invalid Username or Password';
    }
  }

  function addAttendance() {
    const name = document.getElementById('name').value;
    const gender = document.getElementById('gender').value;
    const table = document.getElementById('attendanceTable');

    if (name.trim() === '') return;

    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="border p-2">${name}</td>
      <td class="border p-2">${gender}</td>
      <td class="border p-2 text-center text-green-600 font-bold">✅</td>
    `;

    table.appendChild(row);

    document.getElementById('name').value = '';
  }
</script>

</body>
</html>
